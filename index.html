        document.addEventListener("DOMContentLoaded", function() {
            // Використовуємо setInterval, оскільки React/Next.js може відмалювати кнопку не одразу
            let clickAttempt = setInterval(function() {
                // Шукаємо кнопку за унікальним шляхом SVG іконки "на весь екран"
                const iconPath = document.querySelector('svg path[d^="M17.5858"]');
                if (iconPath) {
                    const fullscreenBtn = iconPath.closest('button');
                    if (fullscreenBtn) {
                        fullscreenBtn.click();
                        clearInterval(clickAttempt);
                    }
                }
            }, 300);
            
            setTimeout(() => clearInterval(clickAttempt), 5000);
        });
    </script>
